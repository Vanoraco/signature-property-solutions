# Use this temporary vhost when the main website is already live and only the
# admin subdomain still needs its first certificate.
server {
    listen 80;
    listen [::]:80;
    server_name admin.signaturepropertysolutions.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        default_type text/plain;
        return 200 "Admin certificate bootstrap is active.\n";
    }
}

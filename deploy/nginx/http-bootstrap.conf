# Temporary HTTP-only vhost for first certificate issuance. Remove this site
# before enabling the two production TLS vhosts.
server {
    listen 80;
    listen [::]:80;
    server_name signaturepropertysolutions.com www.signaturepropertysolutions.com admin.signaturepropertysolutions.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        default_type text/plain;
        return 200 "Certificate bootstrap is active.\n";
    }
}

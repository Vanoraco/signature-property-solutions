limit_req_zone $binary_remote_addr zone=sps_main_login:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name signaturepropertysolutions.com www.signaturepropertysolutions.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 301 https://signaturepropertysolutions.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name signaturepropertysolutions.com www.signaturepropertysolutions.com;

    ssl_certificate /etc/letsencrypt/live/signaturepropertysolutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/signaturepropertysolutions.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SPSMainTLS:10m;
    ssl_session_timeout 1d;

    client_max_body_size 80m;
    client_body_timeout 120s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location ^~ /static/ {
        alias /var/www/signature-property-solutions/statics/;
        access_log off;
        autoindex off;
        expires 7d;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
    }

    location ^~ /images/ {
        alias /var/lib/sps/media/;
        access_log off;
        autoindex off;
        expires 7d;
        types {
            image/bmp bmp;
            image/gif gif;
            image/jpeg jpg jpeg;
            image/png png;
            image/tiff tif tiff;
            image/webp webp;
            video/mp4 mp4;
            video/quicktime mov;
            video/webm webm;
        }
        default_type application/octet-stream;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
    }

    location ~ ^/api/auth/login/?$ {
        limit_req zone=sps_main_login burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }
}

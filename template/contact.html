{% extends 'layouts/master.html' %}
{% block content %}
{% load static %}

<div class="lux-page-header">
  <div class="container">
    <h1>Contact Us</h1>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'index' %}">Home</a></li>
        <li class="breadcrumb-item active">Contact</li>
      </ol>
    </nav>
  </div>
</div>

<!-- Map -->
<section class="lux-section lux-section-dark">
  <div class="container">
    <div class="lux-section-title">
      <h2>Find Us</h2>
      <div class="gold-line"></div>
    </div>
    <div class="lux-map">
      <iframe src="{{ contac.google_map }}" allowfullscreen></iframe>
    </div>
  </div>
</section>

<!-- Contact Info + Form -->
<section class="lux-section lux-section-darker">
  <div class="container">
    <div class="row g-4">
      <div class="col-md-4">
        <div class="lux-contact-card mb-3">
          <i class="fas fa-map-marker-alt"></i>
          <h5>Address</h5>
          <p>{{ contac.address }}</p>
        </div>
        <div class="lux-contact-card mb-3">
          <i class="fas fa-envelope"></i>
          <h5>Email</h5>
          <p>{{ contac.email }}</p>
        </div>
        <div class="lux-contact-card mb-3">
          <i class="fas fa-phone"></i>
          <h5>Phone</h5>
          <p>{{ contac.phone_number }}</p>
        </div>
        <div class="lux-contact-card">
          <i class="fas fa-share-alt"></i>
          <h5>Social</h5>
          <div class="social-links" style="margin-top:0.5rem">
            <a href="{{ contac.facebook }}"><i class="fab fa-facebook-f"></i></a>
            <a href="{{ contac.instagram }}"><i class="fab fa-instagram"></i></a>
            <a href="{{ contac.linkden }}"><i class="fab fa-linkedin-in"></i></a>
          </div>
        </div>
      </div>
      <div class="col-md-8">
        <div class="lux-sidebar">
          <h5>Send Us a Message</h5>
          <form class="lux-form">
            <div class="row g-3">
              <div class="col-sm-6">
                <input type="text" class="form-control" placeholder="Name">
              </div>
              <div class="col-sm-6">
                <input type="email" class="form-control" placeholder="Email">
              </div>
              <div class="col-12">
                <input type="text" class="form-control" placeholder="Subject">
              </div>
              <div class="col-12">
                <textarea class="form-control" placeholder="Your message"></textarea>
              </div>
              <div class="col-12">
                <button type="submit" class="btn-gold">Send Message</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>

{% endblock %}

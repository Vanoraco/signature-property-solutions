{% load static %}
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ seo.title|default:"Signature Property Solutions | Real Estate in Ethiopia" }}</title>
  <meta name="description" content="{{ seo.description|default:'Signature Property Solutions helps clients find verified properties for sale and rent in Ethiopia.' }}">
  <link rel="canonical" href="{{ seo.canonical_url|default:'https://signaturepropertysolutions.com' }}">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ seo.site_name|default:'Signature Property Solutions' }}">
  <meta property="og:title" content="{{ seo.title|default:'Signature Property Solutions | Real Estate in Ethiopia' }}">
  <meta property="og:description" content="{{ seo.description|default:'Signature Property Solutions helps clients find verified properties for sale and rent in Ethiopia.' }}">
  <meta property="og:url" content="{{ seo.canonical_url|default:'https://signaturepropertysolutions.com' }}">
  {% if seo.image_url %}
  <meta property="og:image" content="{{ seo.image_url }}">
  {% endif %}
  <meta name="twitter:card" content="{% if seo.image_url %}summary_large_image{% else %}summary{% endif %}">
  <meta name="twitter:title" content="{{ seo.title|default:'Signature Property Solutions | Real Estate in Ethiopia' }}">
  <meta name="twitter:description" content="{{ seo.description|default:'Signature Property Solutions helps clients find verified properties for sale and rent in Ethiopia.' }}">
  <link rel="shortcut icon" href="{% static 'assets/images/favicon.png' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'assets/css/luxury.css' %}">
  {% if schema_json %}
  <script type="application/ld+json">{{ schema_json|safe }}</script>
  {% endif %}
</head>

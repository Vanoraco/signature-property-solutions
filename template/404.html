{% extends 'layouts/master.html' %}
{% load static %}

{% block content %}

<div class="lux-page-header">
  <div class="container">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'index' %}">Home</a></li>
        <li class="breadcrumb-item active">Page Not Found</li>
      </ol>
    </nav>
  </div>
</div>

<section class="lux-section lux-section-dark">
  <div class="container text-center" style="padding: 6rem 1rem;">
    <div style="font-size: 6rem; font-family: 'Playfair Display', serif; color: var(--gold); line-height: 1; margin-bottom: 1rem;">404</div>
    <h2 style="margin-bottom: 0.75rem;">Page Not Found</h2>
    <p style="color: var(--gray); max-width: 480px; margin: 0 auto 2rem;">
      The page you are looking for does not exist or has been moved.
    </p>
    <a href="{% url 'properties' %}" class="btn-gold">Browse Properties</a>
  </div>
</section>

{% endblock %}

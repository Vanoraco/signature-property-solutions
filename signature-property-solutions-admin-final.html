<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature Property Solutions — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{
  --ink:#1B1B1B;
  --ink-2:#262626;
  --canvas:#F5F4F1;
  --card:#FFFFFF;
  --brass:#C9A227;
  --brass-dark:#9C7A17;
  --brass-tint:#F6EDCE;
  --silver:#9AA1AA;
  --silver-dark:#6B7280;
  --silver-tint:#EEF0F2;
  --success:#2F7B5D;
  --success-tint:#E4F3EC;
  --danger:#C6493F;
  --danger-tint:#FBEAE8;
  --text:#1C1C1C;
  --text-soft:#5C5C5C;
  --text-faint:#8C8C8C;
  --border:#E6E4E0;
  --border-soft:#EFEDEA;
  --radius:10px;
  --shadow-sm:0 1px 2px rgba(18,18,18,.06);
  --shadow-md:0 8px 24px rgba(18,18,18,.10);
  --shadow-lg:0 20px 48px rgba(18,18,18,.20);
  --sidebar-w:264px;
  --sidebar-w-collapsed:76px;
}
[data-theme="dark"]{
  --canvas:#16181A;
  --card:#1E2124;
  --brass-tint:rgba(201,162,39,.16);
  --silver-tint:rgba(154,161,170,.14);
  --success-tint:rgba(47,123,93,.20);
  --danger-tint:rgba(198,73,63,.20);
  --text:#EDEDED;
  --text-soft:#B4B8BB;
  --text-faint:#787D82;
  --border:#2E3134;
  --border-soft:#27292C;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow-md:0 8px 24px rgba(0,0,0,.4);
  --shadow-lg:0 20px 48px rgba(0,0,0,.55);
}
body, .card, .panel, .modal, .sidebar{ transition: background-color .18s ease, border-color .18s ease, color .18s ease; }
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',sans-serif;
  background:var(--canvas);
  color:var(--text);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.font-display{font-family:'Fraunces',serif}
.font-mono{font-family:'IBM Plex Mono',monospace}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text)}
a{color:inherit;text-decoration:none}
::selection{background:var(--brass-tint);color:var(--brass-dark)}

/* ---------- App shell ---------- */
#app{display:flex;min-height:100vh}

/* ---------- Sidebar ---------- */
.sidebar{
  width:var(--sidebar-w);
  flex-shrink:0;
  background:linear-gradient(180deg,var(--ink) 0%, var(--ink-2) 100%);
  color:#fff;
  display:flex;
  flex-direction:column;
  transition:width .22s ease;
  position:relative;
  z-index:20;
}
.sidebar.collapsed{width:var(--sidebar-w-collapsed)}
.sidebar-brand{
  display:flex;align-items:center;gap:10px;
  padding:22px 20px;
  border-bottom:1px solid rgba(255,255,255,.08);
  white-space:nowrap;overflow:hidden;
}
.brand-mark{
  width:34px;height:34px;flex-shrink:0;
  border:1.5px solid var(--brass);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:var(--brass);
  position:relative;
  font-family:'Fraunces',serif;font-weight:700;font-style:italic;font-size:19px;
  background:linear-gradient(160deg, rgba(201,162,39,.14), transparent);
}
.brand-mark::before{
  content:"";position:absolute;top:-7px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:6px solid var(--brass);
}
.brand-name{font-family:'Fraunces',serif;font-weight:600;font-size:18px;letter-spacing:.2px;line-height:1.1}
.brand-sub{font-size:9.5px;color:var(--silver);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.sidebar.collapsed .brand-text{display:none}

.sidebar-toggle{
  position:absolute;top:26px;right:-12px;
  width:24px;height:24px;border-radius:50%;
  background:var(--brass);border:2px solid var(--ink);
  color:var(--ink);display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-sm);z-index:5;
}

.nav{flex:1;overflow-y:auto;padding:14px 12px 20px;}
.nav::-webkit-scrollbar{width:5px}
.nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}

.nav-link, .nav-group-head{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:8px;
  color:rgba(255,255,255,.72);
  font-size:13.5px;font-weight:500;
  white-space:nowrap;overflow:hidden;
  margin-bottom:2px;
  transition:background .15s, color .15s;
  position:relative;
}
.nav-link:hover,.nav-group-head:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-link.active{background:rgba(184,135,75,.16);color:#fff}
.nav-link.active::before{
  content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;
  background:var(--brass);border-radius:2px;
}
.nav-icon{width:17px;height:17px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.nav-label{flex:1;overflow:hidden;text-overflow:ellipsis}
.sidebar.collapsed .nav-label,.sidebar.collapsed .nav-caret,.sidebar.collapsed .nav-group-title{display:none}
.sidebar.collapsed .nav-link,.sidebar.collapsed .nav-group-head{justify-content:center}

.nav-group-title{font-size:10.5px;letter-spacing:1.3px;text-transform:uppercase;color:rgba(255,255,255,.32);padding:16px 12px 6px}
.nav-caret{width:14px;height:14px;transition:transform .18s;color:rgba(255,255,255,.4)}
.nav-group.open .nav-caret{transform:rotate(90deg)}
.nav-children{max-height:0;overflow:hidden;transition:max-height .2s ease}
.nav-group.open .nav-children{max-height:400px}
.nav-child{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px 9px 41px;border-radius:8px;
  color:rgba(255,255,255,.6);font-size:13.2px;
  margin-bottom:1px;position:relative;
}
.nav-child:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-child.active{color:#fff;background:rgba(184,135,75,.16)}
.nav-child.active::before{content:"";position:absolute;left:-12px;top:8px;bottom:8px;width:3px;background:var(--brass);border-radius:2px}
.nav-disabled{opacity:.4;cursor:not-allowed}
.nav-disabled:hover{background:transparent !important;color:rgba(255,255,255,.72) !important}
.nav-child-dot{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.5;flex-shrink:0}
.sidebar.collapsed .nav-children{display:none}

.sidebar-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;white-space:nowrap;overflow:hidden}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--brass);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0}
.sidebar.collapsed .foot-text{display:none}
.foot-name{font-size:13px;font-weight:600;color:#fff}
.foot-role{font-size:11.5px;color:rgba(255,255,255,.45)}

/* ---------- Main ---------- */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{
  height:64px;background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;padding:0 24px;position:sticky;top:0;z-index:10;
}
.topbar-search{
  flex:1;max-width:420px;display:flex;align-items:center;gap:8px;
  background:var(--canvas);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text-faint)
}
.topbar-search input{background:transparent;border:none;outline:none;flex:1;color:var(--text);font-size:13.5px}
.topbar-search input::placeholder{color:var(--text-faint)}
.topbar-actions{display:flex;align-items:center;gap:14px;margin-left:auto}
.icon-btn{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--card);
  display:flex;align-items:center;justify-content:center;color:var(--text-soft);position:relative;
}
.icon-btn:hover{background:var(--canvas);color:var(--text)}
.badge-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--brass);border:1.5px solid var(--card)}
.badge-count{position:absolute;top:-5px;right:-5px;background:var(--danger);color:#fff;font-size:9.5px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;border:1.5px solid var(--card)}
.click-catch{position:fixed;inset:0;z-index:55}
.notif-wrap{position:relative}
.notif-panel{position:absolute;top:46px;right:0;width:340px;max-height:420px;overflow-y:auto;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);z-index:60}
.notif-head{padding:12px 16px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between}
.notif-head h4{font-size:13.5px;font-weight:700;color:var(--ink)}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border-soft);display:flex;gap:10px;cursor:pointer}
.notif-item:hover{background:var(--canvas)}
.notif-item.unread{background:#FFF9EC}
.notif-icon{width:30px;height:30px;border-radius:8px;background:var(--brass-tint);color:var(--brass-dark);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-title{font-size:12.8px;font-weight:600;color:var(--ink)}
.notif-msg{font-size:12px;color:var(--text-soft);margin-top:2px}
.notif-time{font-size:10.5px;color:var(--text-faint);margin-top:4px}
.notif-unread-dot{width:7px;height:7px;border-radius:50%;background:var(--brass);flex-shrink:0;margin-top:5px}

/* command palette */
.cmdk-overlay{align-items:flex-start;padding-top:12vh}
.cmdk-box{background:var(--card);border-radius:14px;width:100%;max-width:560px;box-shadow:var(--shadow-lg);overflow:hidden;animation:modalIn .15s ease}
.cmdk-input-wrap{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border-soft);color:var(--text-faint)}
.cmdk-input-wrap input{flex:1;border:none;outline:none;font-size:15px;color:var(--text);background:transparent}
.cmdk-results{max-height:360px;overflow-y:auto;padding:8px}
.cmdk-group-label{font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--text-faint);font-weight:700;padding:10px 12px 4px}
.cmdk-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer}
.cmdk-item.active{background:var(--canvas)}
.cmdk-item-icon{width:30px;height:30px;border-radius:8px;background:var(--border-soft);color:var(--text-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cmdk-item-title{font-size:13.3px;font-weight:600;color:var(--ink)}
.cmdk-item-sub{font-size:11.5px;color:var(--text-faint)}
.cmdk-foot{padding:10px 18px;border-top:1px solid var(--border-soft);font-size:11px;color:var(--text-faint);display:flex;gap:14px}
.cmdk-empty{padding:40px 20px;text-align:center;color:var(--text-faint);font-size:13px}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-faint)}
.breadcrumb b{color:var(--text);font-weight:600}

.content{flex:1;padding:28px 30px 60px;max-width:1400px;width:100%;margin:0 auto}

/* ---------- Page head ---------- */
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.page-eyebrow{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--brass-dark);font-weight:600;margin-bottom:6px}
.page-title{font-family:'Fraunces',serif;font-size:28px;font-weight:600;color:var(--ink)}
.page-desc{color:var(--text-soft);font-size:13.5px;margin-top:5px;max-width:560px}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:8px;
  font-size:13.5px;font-weight:600;border:1px solid transparent;transition:all .12s;white-space:nowrap;
}
.btn-primary{background:var(--ink);color:#fff}
.btn-primary:hover{background:var(--ink-2)}
.btn-brass{background:var(--brass);color:#fff}
.btn-brass:hover{background:var(--brass-dark)}
.btn-ghost{background:transparent;color:var(--text-soft);border-color:var(--border)}
.btn-ghost:hover{background:var(--canvas);color:var(--text)}
.btn-danger-ghost{background:var(--danger-tint);color:var(--danger);border-color:transparent}
.btn-danger-ghost:hover{background:#f6d9d6}
.btn-sm{padding:7px 12px;font-size:12.5px}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* ---------- Cards / stats ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:26px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow-sm)}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stat-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--brass-tint);color:var(--brass-dark)}
.stat-value{font-family:'Fraunces',serif;font-size:26px;font-weight:600;color:var(--ink)}
.stat-label{font-size:12.5px;color:var(--text-soft);margin-top:2px}
.stat-trend{font-size:11.5px;font-weight:600;padding:3px 7px;border-radius:20px}
.trend-up{background:var(--success-tint);color:var(--success)}
.trend-down{background:var(--danger-tint);color:var(--danger)}

.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
.panel-head{padding:16px 20px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between}
.panel-head h3{font-size:14.5px;font-weight:600;color:var(--ink)}
.panel-body{padding:20px}

/* ---------- Toolbar ---------- */
.toolbar{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border-soft);flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:8px;background:var(--canvas);border:1px solid var(--border);border-radius:8px;padding:8px 12px;min-width:220px;color:var(--text-faint)}
.search-box input{background:transparent;border:none;outline:none;flex:1;font-size:13px;color:var(--text)}
.filter-select{background:var(--canvas);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text-soft)}
.toolbar-spacer{flex:1}
.count-chip{font-size:12px;color:var(--text-faint);font-family:'IBM Plex Mono',monospace}

/* ---------- Table ---------- */
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:640px}
thead th{
  text-align:left;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--text-faint);
  padding:11px 18px;border-bottom:1px solid var(--border);background:#FAFBFB;white-space:nowrap;
  font-weight:600;
}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:var(--text-soft)}
.sort-ind{display:inline-block;margin-left:4px;opacity:.5}
tbody td{padding:13px 18px;border-bottom:1px solid var(--border-soft);vertical-align:middle;font-size:13.3px}
tbody tr:hover{background:#FAFBFC}
tbody tr:last-child td{border-bottom:none}
.cell-id{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--text-faint)}
.cell-primary{font-weight:600;color:var(--ink)}
.cell-sub{font-size:11.5px;color:var(--text-faint);margin-top:1px}
.cell-thumb{width:42px;height:42px;border-radius:7px;object-fit:cover;background:var(--border-soft);flex-shrink:0}
.cell-flex{display:flex;align-items:center;gap:11px}
.row-actions{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.chip{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px;white-space:nowrap}
.chip-brass{background:var(--brass-tint);color:var(--brass-dark)}
.chip-success{background:var(--success-tint);color:var(--success)}
.chip-danger{background:var(--danger-tint);color:var(--danger)}
.chip-gray{background:var(--border-soft);color:var(--text-soft)}
.chip-list{display:flex;gap:5px;flex-wrap:wrap;max-width:220px}
.stars{color:var(--brass);letter-spacing:1px;font-size:13px}
.toggle{width:36px;height:20px;border-radius:20px;background:var(--border);position:relative;flex-shrink:0;transition:background .15s}
.toggle.on{background:var(--success)}
.toggle-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
.toggle.on .toggle-knob{left:18px}
.empty-state{padding:60px 30px;text-align:center;color:var(--text-faint)}
.empty-state svg{margin-bottom:12px;opacity:.5}
.empty-state-title{font-family:'Fraunces',serif;font-size:16px;color:var(--text-soft);margin-bottom:4px}

.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-top:1px solid var(--border-soft);flex-wrap:wrap;gap:10px}
.pg-info{font-size:12.5px;color:var(--text-faint)}
.pg-btns{display:flex;align-items:center;gap:6px}
.pg-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--text-soft);font-size:12.5px;font-weight:600}
.pg-btn:hover:not(:disabled){background:var(--canvas)}
.pg-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.pg-btn:disabled{opacity:.35}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(20,20,20,.5);backdrop-filter:blur(2px);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border-radius:14px;width:100%;max-width:640px;max-height:88vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);animation:modalIn .18s cubic-bezier(.2,.8,.3,1)}
.modal.modal-lg{max-width:840px}
@keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{padding:18px 24px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:var(--ink)}
.modal-head p{font-size:12px;color:var(--text-faint);margin-top:2px}
.modal-close{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--text-soft)}
.modal-close:hover{background:var(--canvas)}
.modal-body{padding:22px 24px;overflow-y:auto;flex:1}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border-soft);display:flex;justify-content:flex-end;gap:10px}

.confirm-modal{max-width:400px;padding:26px}
.confirm-icon{width:44px;height:44px;border-radius:10px;background:var(--danger-tint);color:var(--danger);display:flex;align-items:center;justify-content:center;margin-bottom:14px}

/* ---------- Form ---------- */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin:-22px -24px 20px;padding:0 24px}
.tab-btn{padding:12px 14px;font-size:13px;font-weight:600;color:var(--text-faint);border-bottom:2px solid transparent;position:relative;top:1px}
.tab-btn.active{color:var(--ink);border-color:var(--brass)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid .span2{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12.5px;font-weight:600;color:var(--text-soft)}
.field label .req{color:var(--danger);margin-left:2px}
.field input[type=text],.field input[type=number],.field input[type=email],.field input[type=url],.field input[type=date],.field select,.field textarea{
  border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13.3px;outline:none;background:var(--card);color:var(--text);
  transition:border-color .12s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brass)}
.field textarea{resize:vertical;min-height:70px}
.field-hint{font-size:11px;color:var(--text-faint)}
.m2m-list{display:flex;flex-wrap:wrap;gap:8px}
.m2m-opt{display:flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12.5px;cursor:pointer;color:var(--text-soft)}
.m2m-opt.checked{background:var(--ink);color:#fff;border-color:var(--ink)}
.rating-input{display:flex;gap:4px}
.rating-star{font-size:20px;color:var(--border);cursor:pointer}
.rating-star.on{color:var(--brass)}
.price-history-list{display:flex;flex-direction:column;gap:6px}
.price-history-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--canvas);border-radius:7px;font-size:12.5px}
.saved-views-row{display:flex;align-items:center;gap:8px;padding:10px 18px;border-bottom:1px solid var(--border-soft);flex-wrap:wrap}
.saved-views-label{font-size:11.5px;color:var(--text-faint);display:flex;align-items:center;gap:5px;font-weight:600}
.saved-view-chip{display:inline-flex;align-items:center;gap:6px;background:var(--canvas);border:1px solid var(--border);border-radius:20px;padding:4px 6px 4px 12px;font-size:12px;color:var(--text-soft)}
.saved-view-chip span:first-child{cursor:pointer}
.saved-view-chip:hover{border-color:var(--brass)}
.saved-view-chip .rm{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-faint);cursor:pointer}
.saved-view-chip .rm:hover{background:var(--danger-tint);color:var(--danger)}
.kanban-board{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px}
.kanban-col{flex:0 0 250px;background:var(--canvas);border-radius:10px;border:1px solid var(--border-soft);display:flex;flex-direction:column;max-height:calc(100vh - 220px)}
.kanban-col-head{padding:12px 14px;font-size:12.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-soft)}
.kanban-col-body{padding:10px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:9px}
.kanban-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 12px;cursor:grab;box-shadow:var(--shadow-sm)}
.kanban-card:active{cursor:grabbing}
.kanban-card-top{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:4px}
.kanban-empty{text-align:center;color:var(--text-faint);font-size:11.5px;padding:20px 10px}
@media (max-width:640px){.kanban-col{flex:0 0 220px}}

/* image field */
.img-field{display:flex;align-items:center;gap:12px}
.img-preview{width:64px;height:64px;border-radius:9px;object-fit:cover;background:var(--canvas);border:1px solid var(--border);flex-shrink:0}
.img-preview-empty{width:64px;height:64px;border-radius:9px;background:var(--canvas);border:1px dashed var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text-faint)}
.gallery-grid{display:flex;flex-wrap:wrap;gap:10px}
.gallery-item{position:relative;width:76px;height:76px;border-radius:9px;overflow:hidden;border:1px solid var(--border)}
.gallery-item img{width:100%;height:100%;object-fit:cover}
.gallery-item .rm{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(20,20,20,.65);color:#fff;display:flex;align-items:center;justify-content:center}
.gallery-add{width:76px;height:76px;border-radius:9px;border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-faint);flex-direction:column;gap:3px;font-size:10.5px}
.gallery-add:hover{border-color:var(--brass);color:var(--brass-dark)}

/* rich text editor */
.rte{border:1px solid var(--border);border-radius:8px;overflow:hidden}
.rte-toolbar{display:flex;align-items:center;gap:2px;background:var(--canvas);border-bottom:1px solid var(--border);padding:6px}
.rte-btn{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text-soft)}
.rte-btn:hover{background:#fff;color:var(--text)}
.rte-sep{width:1px;height:18px;background:var(--border);margin:0 4px}
.rte-content{min-height:110px;max-height:260px;overflow-y:auto;padding:11px 13px;font-size:13.3px;outline:none;line-height:1.6}
.rte-content:empty:before{content:attr(data-placeholder);color:var(--text-faint)}
.rte-content ul,.rte-content ol{padding-left:22px}

/* toast */
#toastRoot{position:fixed;bottom:22px;right:22px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;align-items:center;gap:10px;background:var(--ink);color:#fff;padding:12px 16px;border-radius:9px;box-shadow:var(--shadow-lg);font-size:13px;font-weight:500;min-width:240px;animation:toastIn .2s ease}
.toast.success .toast-ic{color:#7CE0B4}
.toast.danger .toast-ic{color:#F19A93}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* media library */
.dropzone{border:1.5px dashed var(--border);border-radius:12px;padding:34px 20px;text-align:center;background:var(--card);transition:border-color .15s,background .15s}
.dropzone.drag{border-color:var(--brass);background:var(--brass-tint)}
.dropzone-icon{width:44px;height:44px;border-radius:10px;background:var(--brass-tint);color:var(--brass-dark);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-top:18px}
.media-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--card);cursor:pointer;transition:box-shadow .15s,border-color .15s}
.media-card:hover{box-shadow:var(--shadow-md);border-color:var(--brass)}
.media-card.selected{border-color:var(--brass);box-shadow:0 0 0 3px var(--brass-tint)}
.media-thumb{width:100%;height:110px;object-fit:cover;background:var(--canvas);display:block}
.media-meta{padding:9px 10px}
.media-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.media-sub{font-size:10.5px;color:var(--text-faint);margin-top:2px;font-family:'IBM Plex Mono',monospace}

/* form builder */
.fb-layout{display:grid;grid-template-columns:1.2fr 1fr;gap:20px;align-items:start}
@media (max-width:980px){.fb-layout{grid-template-columns:1fr}}
.fb-field-row{display:flex;align-items:center;gap:10px;border:1px solid var(--border);border-radius:9px;padding:11px 12px;background:var(--card);margin-bottom:9px}
.fb-handle{color:var(--text-faint);cursor:grab;display:flex}
.fb-field-row.dragging{opacity:.4}
.fb-field-info{flex:1;min-width:0}
.fb-field-label{font-size:13px;font-weight:600;color:var(--text)}
.fb-field-type{font-size:11px;color:var(--text-faint);font-family:'IBM Plex Mono',monospace;margin-top:1px}
.fb-field-actions{display:flex;gap:4px}
.preview-frame{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;position:sticky;top:80px}
.preview-form-field{margin-bottom:14px}
.preview-form-field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px;color:var(--text-soft)}
.preview-form-field .fake-input{border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13px;color:var(--text-faint);background:var(--canvas)}

/* settings tabs page */
.settings-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.settings-tab{padding:9px 15px;border-radius:8px;font-size:13px;font-weight:600;color:var(--text-soft);border:1px solid var(--border);background:var(--card)}
.settings-tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}

.mobile-overlay{display:none}

/* ---------- Dashboard map ---------- */
.map-panel-head{padding:16px 20px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.map-legend{display:flex;align-items:center;gap:14px;font-size:11.5px;color:var(--text-faint);flex-wrap:wrap}
.map-legend span{display:inline-flex;align-items:center;gap:5px}
.map-legend i{width:9px;height:9px;border-radius:50%;display:inline-block}
.map-wrap{height:420px;width:100%}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}
.chart-card{padding:18px 20px;height:240px;position:relative}
.chart-fallback{position:absolute;inset:18px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-faint);text-align:center;font-size:12.5px;background:var(--canvas);border-radius:8px}
@media (max-width:980px){.charts-grid{grid-template-columns:1fr !important}}
.map-wrap .leaflet-container{background:var(--canvas);font-family:'Inter',sans-serif}
.pin{width:30px;height:30px;position:relative;display:flex;align-items:center;justify-content:center;transform:translateY(-6px)}
.pin-body{width:26px;height:26px;border-radius:50% 50% 50% 0;background:var(--ink);border:2px solid var(--brass);transform:rotate(-45deg);box-shadow:var(--shadow-md);display:flex;align-items:center;justify-content:center}
.pin-body.rent{border-color:var(--success)}
.pin-dot{width:8px;height:8px;border-radius:50%;background:var(--brass);transform:rotate(45deg)}
.pin-body.rent .pin-dot{background:var(--success)}
.leaflet-popup-content-wrapper{border-radius:12px;box-shadow:var(--shadow-lg);padding:0;overflow:hidden}
.leaflet-popup-content{margin:0;width:260px !important}
.leaflet-popup-tip{background:var(--card)}
.map-balloon img{width:100%;height:120px;object-fit:cover;display:block}
.map-balloon-body{padding:12px 14px}
.map-balloon-title{font-family:'Fraunces',serif;font-weight:600;font-size:14.5px;color:var(--ink);margin-bottom:2px}
.map-balloon-loc{font-size:11.5px;color:var(--text-faint);display:flex;align-items:center;gap:4px;margin-bottom:8px}
.map-balloon-price{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13.5px;color:var(--ink);margin-bottom:8px}
.map-balloon-meta{display:flex;gap:10px;font-size:11.5px;color:var(--text-soft);margin-bottom:10px;flex-wrap:wrap}
.map-balloon-agent{font-size:11px;color:var(--text-faint);border-top:1px solid var(--border-soft);padding-top:8px;margin-bottom:10px}
.map-balloon-btn{display:block;width:100%;text-align:center;padding:8px;border-radius:7px;background:var(--ink);color:#fff;font-size:12px;font-weight:600}
@media (max-width:1180px){
  .content{padding:26px 22px 50px}
}
@media (max-width:880px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:264px;transform:translateX(-100%);transition:transform .22s}
  .sidebar.mobile-open{transform:translateX(0)}
  .sidebar.collapsed{width:264px}
  .sidebar-toggle{display:none}
  .mobile-overlay.show{display:block;position:fixed;inset:0;background:rgba(20,20,20,.45);z-index:15}
  #mobileMenuBtn{display:flex !important}
  .form-grid{grid-template-columns:1fr}
  .fb-layout{grid-template-columns:1fr}
  .content{padding:20px 16px 50px}
  .topbar{padding:0 16px;gap:8px}
  .topbar-search{max-width:180px}
  .stat-grid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  .map-wrap{height:320px}
  .leaflet-popup-content{width:230px !important}
  .settings-tabs{gap:6px}
  .modal{max-width:94vw}
}
@media (max-width:640px){
  .breadcrumb span:first-child, .breadcrumb svg:first-of-type{display:none}
  .page-head{flex-direction:column;align-items:stretch}
  .page-head > div:first-child{margin-bottom:2px}
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .stat-card{padding:14px 15px}
  .stat-value{font-size:21px}
  .fb-layout, .form-grid{grid-template-columns:1fr}
}
@media (max-width:480px){
  html{font-size:15px}
  .content{padding:14px 10px 40px}
  .topbar{height:58px;padding:0 12px}
  .topbar-search{display:none}
  .topbar-actions{gap:8px;margin-left:0}
  .icon-btn{width:32px;height:32px}
  .page-title{font-size:20px}
  .page-desc{font-size:12.5px}
  .btn{padding:8px 12px;font-size:12.5px}
  .stat-grid{grid-template-columns:1fr 1fr;gap:8px}
  .stat-card{padding:12px 13px}
  .stat-value{font-size:19px}
  .stat-icon{width:28px;height:28px}
  .panel-head, .toolbar{padding:12px 14px}
  thead th{padding:9px 12px;font-size:10px}
  tbody td{padding:10px 12px;font-size:12.5px}
  .cell-thumb{width:34px;height:34px}
  .search-box{min-width:0;flex:1}
  .pagination{padding:12px 14px}
  .modal-head{padding:14px 16px}
  .modal-body{padding:16px}
  .modal-foot{padding:12px 16px;flex-wrap:wrap}
  .modal-foot .btn{flex:1;justify-content:center}
  .map-wrap{height:260px}
  .map-legend{font-size:10.5px;gap:10px}
  .leaflet-popup-content{width:200px !important}
  .settings-tab{padding:7px 11px;font-size:12px}
  .sidebar-brand{padding:18px 16px}
  .sidebar-foot{padding:12px 16px}
  .media-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
  .gallery-item, .gallery-add{width:64px;height:64px}
}
</style>

<script>
/* ================= ICONS ================= */
const ICONS = {

  bell:'<path d="M6 9a6 6 0 0112 0c0 5 2 6 2 6H4s2-1 2-6z"/><path d="M10 19a2 2 0 004 0"/>',
  chevronRight:'<path d="M9 6l6 6-6 6"/>',
  chevronLeft:'<path d="M15 6l-6 6 6 6"/>',
  chevronDown:'<path d="M6 9l6 6 6-6"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  edit:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/>',
  trash:'<path d="M4 7h16"/><path d="M9 7V4h6v3"/><path d="M6 7l1 13h10l1-13"/>',
  x:'<path d="M18 6L6 18M6 6l12 12"/>',
  check:'<path d="M20 6L9 17l-5-5"/>',
  upload:'<path d="M12 16V4"/><path d="M6 10l6-6 6 6"/><path d="M4 20h16"/>',
  download:'<path d="M12 4v12"/><path d="M6 12l6 6 6-6"/><path d="M4 20h16"/>',
  bold:'<path d="M6 4h7a3.5 3.5 0 010 7H6z"/><path d="M6 11h8a3.5 3.5 0 010 7H6z"/>',

  link:'<path d="M9 15l6-6"/><path d="M11 6l1-1a4 4 0 016 6l-1 1"/><path d="M13 18l-1 1a4 4 0 01-6-6l1-1"/>',

  menu:'<path d="M4 7h16M4 12h16M4 17h16"/>',

  lock:'<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/>',

function icon(name,size=17,strokeW=1.9){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${strokeW}" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`;
}

/* ================= UTILS ================= */
let __uid = 1000;
function uid(){ return __uid++; }
function esc(s){ return (s===undefined||s===null) ? '' : String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function stripHtml(s){ const d=document.createElement('div'); d.innerHTML=s||''; return d.textContent||''; }
function truncate(s,n){ s=s||''; return s.length>n ? s.slice(0,n)+'…' : s; }
function fmtDate(d){
  if(!d) return '—';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' · '+dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
function fmtPrice(v){
  if(v===undefined||v===null||v==='') return '—';
  const n = Number(String(v).replace(/[^0-9.]/g,''));
  if(isNaN(n)) return esc(v);
  return '$'+n.toLocaleString('en-US');
}
function fmtPropertyPrice(r){
  return fmtPriceFor(r.price, r.property_status);
}
function fmtPriceFor(value, status){
  const n = Number(String(value).replace(/[^0-9.]/g,''));
  if(isNaN(n)) return esc(value||'—');
  if(status==='For Sale') return n.toLocaleString('en-US')+' ETB';
  return '$'+n.toLocaleString('en-US')+'/mo';
}

function debounce(fn,ms){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; }

function toast(msg, type='default', ic='check'){
  const root = document.getElementById('toastRoot');
  const el = document.createElement('div');
  el.className = 'toast '+type;
  el.innerHTML = `<span class="toast-ic">${icon(ic,16)}</span><span>${esc(msg)}</span>`;
  root.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .25s, transform .25s'; el.style.opacity='0'; el.style.transform='translateY(6px)'; setTimeout(()=>el.remove(),250); }, 2600);
}

(function seedMedia(){

/* ================= ROOT RENDER ================= */
function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="mobile-overlay ${UI.mobileOpen?'show':''}" onclick="App.closeMobile()"></div>
    ${renderSidebar()}
    <div class="main">
      ${renderTopbar()}
      ${UI.previewRole ? renderPreviewBanner() : ''}
      <div class="content">${renderContent()}</div>
    </div>
  `;
  renderModal();
  if(UI.view==='dashboard') requestAnimationFrame(()=>{ initDashboardMap(); initDashboardCharts(); });
  else {
    if(_dashboardMapInstance){ _dashboardMapInstance.remove(); _dashboardMapInstance=null; }
    destroyDashboardCharts();
  }
  if(UI.view==='leaderboard') requestAnimationFrame(initLeaderboardChart);
  else destroyLeaderboardChart();
}
function renderPreviewBanner(){
  const role = roleById(UI.previewRole);
  if(!role) return '';
  return `<div style="background:${role.color}17;border-bottom:1px solid ${role.color}55;padding:10px 24px;display:flex;align-items:center;gap:10px;font-size:13px">
    <span style="color:${role.color}">${icon('eye',15)}</span>
    <span>Previewing the sidebar as <b>${esc(role.name)}</b> — locked items reflect this role's permissions.</span>
    <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="App.setPreviewRole('')">${icon('x',13)}Exit Preview</button>
  </div>`;
}

function renderSidebar(){
  const collapsedCls = UI.sidebarCollapsed ? 'collapsed' : '';
  const mobileCls = UI.mobileOpen ? 'mobile-open' : '';
  const role = UI.previewRole ? roleById(UI.previewRole) : null;
  const permFor = (id) => role ? (role.permissions[id]||'none') : 'manage';
  const lockSpan = `<span style="margin-left:auto;opacity:.6">${icon('lock',12)}</span>`;
  const items = NAV.map(n=>{
    if(n.type==='link'){
      const active = UI.view===n.id;
      const perm = permFor(n.id);
      const locked = role && perm==='none';
      return `<div class="nav-link ${active?'active':''} ${locked?'nav-disabled':''}" onclick="${locked?'':`App.go('${n.id}')`}">
        <span class="nav-icon">${icon(n.icon,17)}</span><span class="nav-label">${n.label}</span>${locked?lockSpan:''}
      </div>`;
    }
    const open = !!UI.openGroups[n.id];
    const allLocked = role && n.items.every(it=>permFor(it.id)==='none');
    return `<div class="nav-group ${open?'open':''} ${allLocked?'nav-disabled':''}">
      <div class="nav-group-head" onclick="App.toggleGroup('${n.id}')">
        <span class="nav-icon">${icon(n.icon,17)}</span><span class="nav-label">${n.label}</span>
        ${allLocked?lockSpan:''}<span class="nav-caret">${icon('chevronRight',13)}</span>
      </div>
      <div class="nav-children">
        ${n.items.map(it=>{
          const perm = permFor(it.id);
          const locked = role && perm==='none';
          return `<div class="nav-child ${UI.view===it.id?'active':''} ${locked?'nav-disabled':''}" onclick="${locked?'':`App.go('${it.id}')`}"><span class="nav-child-dot"></span>${it.label}${locked?lockSpan:''}</div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  return `
  <aside class="sidebar ${collapsedCls} ${mobileCls}" id="sidebar">
    <button class="sidebar-toggle" onclick="App.toggleSidebar()">${icon(UI.sidebarCollapsed?'chevronRight':'chevronLeft',13)}</button>
    <div class="sidebar-brand">

      <div class="brand-text"><div class="brand-name">Signature</div><div class="brand-sub">Property Solutions</div></div>
    </div>
    <nav class="nav">${items}</nav>
    <div class="sidebar-foot">
      <div class="avatar">JD</div>
      <div class="foot-text"><div class="foot-name">Jhon D.</div><div class="foot-role">Administrator</div></div>
    </div>
  </aside>`;
}

function renderTopbar(){
  const [group,title] = PAGE_TITLES[UI.view] || ['','Dashboard'];
  const unread = STATE.notifications.filter(n=>!n.read).length;
  return `

function timeAgo(dateStr){
  const s = Math.floor((Date.now()-new Date(dateStr).getTime())/1000);
  if(s<60) return 'just now';
  const m = Math.floor(s/60); if(m<60) return m+'m ago';
  const h = Math.floor(m/60); if(h<24) return h+'h ago';
  const d = Math.floor(h/24); if(d<7) return d+'d ago';
  return fmtDate(dateStr);
}

/* ================= GENERIC ENTITY TABLE PAGE ================= */
function matchesSearch(rec, schema, q){
  if(!q) return true;
  q = q.toLowerCase();
  return Object.keys(rec).some(k=>{
    const v = rec[k];
    if(v==null) return false;
    if(typeof v==='object') return false;
    return String(stripHtml(String(v))).toLowerCase().includes(q);
  });
}
function renderEntityPage(key){
  const schema = SCHEMAS[key];
  const st = tState(key);
  let rows = STATE[key].filter(r=>matchesSearch(r,schema,st.search));
  if(st.sortKey){
    const col = schema.columns.find(c=>c.key===st.sortKey);
    const sv = col && col.sortVal ? col.sortVal : (r=>r[st.sortKey]);
    rows = rows.slice().sort((a,b)=>{
      let av=sv(a), bv=sv(b);
      if(typeof av==='string') av=av.toLowerCase();
      if(typeof bv==='string') bv=bv.toLowerCase();
      if(av<bv) return st.sortDir==='asc'?-1:1;
      if(av>bv) return st.sortDir==='asc'?1:-1;
      return 0;
    });
  }
  const total = rows.length;
  const pages = Math.max(1,Math.ceil(total/st.pageSize));
  st.page = Math.min(st.page,pages);
  const pageRows = rows.slice((st.page-1)*st.pageSize, st.page*st.pageSize);

  const addBtn = schema.readOnly ? '' : (schema.readOnlyCreate ? '' : `<button class="btn btn-brass" onclick="App.openForm('${key}')">${icon('plus',16)}New ${schema.singular}</button>`);
  const bulkBtns = schema.bulk ? `
    <button class="btn btn-ghost" onclick="App.exportCSV('${key}')">${icon('download',15)}Export CSV</button>
    <button class="btn btn-ghost" onclick="App.openImport('${key}')">${icon('upload',15)}Import CSV</button>
  ` : '';

  const sel = UI.selection[key] || {};
  const selectedIds = Object.keys(sel).filter(id=>sel[id]).map(Number);
  const selectedCount = selectedIds.length;
  const pageIds = pageRows.map(r=>r.id);
  const allPageSelected = pageIds.length>0 && pageIds.every(id=>sel[id]);

  const bulkBar = selectedCount>0 ? `
    <div class="toolbar" style="background:var(--brass-tint);border-bottom:1px solid var(--border)">
      <span style="font-size:13px;font-weight:600;color:var(--brass-dark)">${selectedCount} selected</span>
      <div class="toolbar-spacer"></div>
      ${key==='properties' ? `
        <select class="filter-select" onchange="if(this.value){App.bulkSetAvailability('${key}',this.value);this.value=''}">
          <option value="">Set availability…</option>
          <option value="Available">Available</option>
          <option value="Sold">Sold</option>
          <option value="Rented Out">Rented Out</option>
        </select>
      ` : ''}
      ${schema.bulk ? `<button class="btn btn-ghost btn-sm" onclick="App.bulkExport('${key}')">${icon('download',13)}Export Selected</button>` : ''}
      ${!schema.readOnly ? `<button class="btn btn-danger-ghost btn-sm" onclick="App.bulkDelete('${key}')">${icon('trash',13)}Delete Selected</button>` : ''}
      <button class="btn btn-ghost btn-sm" onclick="App.clearSelection('${key}')">${icon('x',13)}Clear</button>
    </div>
  ` : '';

  return `
  <div class="page-head">
    <div>
      <div class="page-eyebrow">${esc(PAGE_TITLES[key][0])}</div>
      <div class="page-title">${esc(schema.label)}</div>
      <div class="page-desc">${schema.readOnly? 'Read-only log captured automatically from the public site search bar.' : `Manage every ${schema.singular.toLowerCase()} record shown across the site.`}</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">${key==='property_request'?renderLeadViewToggle():''}${bulkBtns}${addBtn}</div>
  </div>
  <div class="panel">
    <div class="toolbar">
      <div class="search-box">${icon('search',15)}<input placeholder="Search ${schema.label.toLowerCase()}…" value="${esc(st.search)}" oninput="App.setSearch('${key}',this.value)"></div>
      <span class="count-chip">${total} record${total===1?'':'s'}</span>
      <div class="toolbar-spacer"></div>
      <button class="btn btn-ghost btn-sm" onclick="App.saveCurrentView('${key}')" title="Save current search/sort as a view">${icon('bookmark',13)}Save View</button>
      <select class="filter-select" onchange="App.setPageSize('${key}',this.value)">
        ${[5,8,10,20].map(n=>`<option value="${n}" ${st.pageSize==n?'selected':''}>${n} / page</option>`).join('')}
      </select>
    </div>
    ${renderSavedViewsRow(key)}
    ${bulkBar}
    <div class="table-scroll">
      <table>
        <thead><tr>
          <th style="width:36px"><input type="checkbox" ${allPageSelected?'checked':''} onchange="App.toggleSelectAllVisible('${key}',this.checked,[${pageIds.join(',')}])"></th>
          ${schema.columns.map(c=>`<th class="${c.sortVal?'sortable':''}" onclick="${c.sortVal?`App.sort('${key}','${c.key}')`:''}">${esc(c.label)}${st.sortKey===c.key?`<span class="sort-ind">${st.sortDir==='asc'?'▲':'▼'}</span>`:''}</th>`).join('')}
          <th style="text-align:right">Actions</th>
        </tr></thead>
        <tbody>
          ${pageRows.length? pageRows.map(r=>`<tr>
            <td><input type="checkbox" ${sel[r.id]?'checked':''} onchange="App.toggleRowSelect('${key}',${r.id},this.checked)"></td>
            ${schema.columns.map(c=>`<td>${c.render(r)}</td>`).join('')}
            <td><div class="row-actions">${renderRowActions(key,r,schema)}</div></td>
          </tr>`).join('') : `<tr><td colspan="${schema.columns.length+2}">${renderEmptyRow(schema)}</td></tr>`}
        </tbody>
      </table>
    </div>
    ${renderPagination(key,st,total,pages)}
  </div>`;

function renderRowActions(key,r,schema){

    btns += `<button class="btn btn-ghost btn-sm" onclick="App.printFlyer(${r.id})" title="Print / Save as PDF flyer">${icon('printer',14)}</button>`;

    btns += `<button class="btn btn-ghost btn-sm" onclick="App.toggleField('${key}',${r.id},'is_reviewed')" title="Toggle reviewed">${icon('check',14)}</button>`;
    btns += `<button class="btn btn-danger-ghost btn-sm" onclick="App.confirmDelete('${key}',${r.id})">${icon('trash',14)}</button>`;

  }
  btns += `<button class="btn btn-ghost btn-sm" onclick="App.openForm('${key}',${r.id})" title="Edit">${icon('edit',14)}</button>`;
  btns += `<button class="btn btn-danger-ghost btn-sm" onclick="App.confirmDelete('${key}',${r.id})" title="Delete">${icon('trash',14)}</button>`;

function renderPagination(key,st,total,pages){
  const from = total===0?0:(st.page-1)*st.pageSize+1;
  const to = Math.min(st.page*st.pageSize,total);
  let nums = '';
  for(let p=1;p<=pages;p++){
    if(pages>7 && Math.abs(p-st.page)>2 && p!==1 && p!==pages){ if(p===2||p===pages-1) nums+=`<span style="padding:0 4px;color:var(--text-faint)">…</span>`; continue; }
    nums += `<button class="pg-btn ${p===st.page?'active':''}" onclick="App.setPage('${key}',${p})">${p}</button>`;
  }
  return `<div class="pagination">
    <div class="pg-info">Showing <b>${from}–${to}</b> of <b>${total}</b></div>
    <div class="pg-btns">
      <button class="pg-btn" ${st.page<=1?'disabled':''} onclick="App.setPage('${key}',${st.page-1})">${icon('chevronLeft',13)}</button>
      ${nums}
      <button class="pg-btn" ${st.page>=pages?'disabled':''} onclick="App.setPage('${key}',${st.page+1})">${icon('chevronRight',13)}</button>
    </div>
  </div>`;
}

/* ================= COMMAND PALETTE ================= */
function computeCommandResults(query){
  const q = query.trim().toLowerCase();
  const groups = [];
  const pageMatches = [];
  NAV.forEach(n=>{
    if(n.type==='link'){ if(!q || n.label.toLowerCase().includes(q)) pageMatches.push({label:n.label, sub:'Page', icon:n.icon, action:()=>{App.closeCommandPalette(); App.go(n.id);}}); }
    else { n.items.forEach(it=>{ if(!q || it.label.toLowerCase().includes(q)) pageMatches.push({label:it.label, sub:'Page', icon:n.icon, action:()=>{App.closeCommandPalette(); App.go(it.id);}}); }); }
  });
  if(pageMatches.length) groups.push({label:'Pages', items:pageMatches.slice(0,6)});

  if(q){
    const propMatches = STATE.properties.filter(p=>p.property_title.toLowerCase().includes(q)||p.property_id.toLowerCase().includes(q)).slice(0,5)
      .map(p=>({label:p.property_title, sub:p.property_id+' · '+fmtPropertyPrice(p), icon:'home', action:()=>{App.closeCommandPalette(); App.go('properties'); setTimeout(()=>App.openForm('properties',p.id),0);}}));
    if(propMatches.length) groups.push({label:'Properties', items:propMatches});

    const agentMatches = STATE.egent.filter(a=>a.name.toLowerCase().includes(q)).slice(0,5)
      .map(a=>({label:a.name, sub:'Agent', icon:'users', action:()=>{App.closeCommandPalette(); App.go('egent'); setTimeout(()=>App.openForm('egent',a.id),0);}}));
    if(agentMatches.length) groups.push({label:'Agents', items:agentMatches});

    const userMatches = STATE.users.filter(u=>u.name.toLowerCase().includes(q)).slice(0,5)
      .map(u=>{ const role=roleById(u.role); return {label:u.name, sub:'User'+(role?' · '+role.name:''), icon:'users', action:()=>{App.closeCommandPalette(); App.go('users'); setTimeout(()=>App.openForm('users',u.id),0);}}; });
    if(userMatches.length) groups.push({label:'Users', items:userMatches});

    const leadMatches = STATE.property_request.filter(r=>r.name.toLowerCase().includes(q)).slice(0,5)
      .map(r=>({label:r.name, sub:'Property Request', icon:'inbox', action:()=>{App.closeCommandPalette(); App.go('property_request'); setTimeout(()=>App.openView('property_request',r.id),0);}}));
    if(leadMatches.length) groups.push({label:'Property Requests', items:leadMatches});

    const catMatches = STATE.category.filter(c=>c.catagorys.toLowerCase().includes(q)).slice(0,5)
      .map(c=>({label:c.catagorys, sub:'Category', icon:'tag', action:()=>{App.closeCommandPalette(); App.go('category'); setTimeout(()=>App.openForm('category',c.id),0);}}));
    if(catMatches.length) groups.push({label:'Categories', items:catMatches});
  }
  return groups;
}
function renderCmdResultsHTML(groups){
  if(!groups.length) return `<div class="cmdk-empty">No matches. Try a different search.</div>`;
  let idx=0, html='';
  groups.forEach(g=>{
    html += `<div class="cmdk-group-label">${esc(g.label)}</div>`;
    g.items.forEach(it=>{
      html += `<div class="cmdk-item ${idx===UI.cmdPalette.index?'active':''}" data-idx="${idx}" onclick="App.activateCommandItem(${idx})">
        <div class="cmdk-item-icon">${icon(it.icon,15)}</div>
        <div><div class="cmdk-item-title">${esc(it.label)}</div><div class="cmdk-item-sub">${esc(it.sub)}</div></div>
      </div>`;
      idx++;
    });
  });
  return html;
}
function updateCmdResults(){
  const groups = computeCommandResults(UI.cmdPalette.query);
  UI.cmdPalette.flatItems = groups.flatMap(g=>g.items);
  if(UI.cmdPalette.index >= UI.cmdPalette.flatItems.length) UI.cmdPalette.index = 0;
  const resultsEl = document.getElementById('cmdkResults');
  if(resultsEl) resultsEl.innerHTML = renderCmdResultsHTML(groups);
}
function highlightCmdIndex(){
  document.querySelectorAll('#cmdkResults .cmdk-item').forEach(el=>{
    el.classList.toggle('active', Number(el.dataset.idx)===UI.cmdPalette.index);
  });
  const activeEl = document.querySelector('#cmdkResults .cmdk-item.active');
  if(activeEl) activeEl.scrollIntoView({block:'nearest'});
}

/* ---------- CRUD form modal (generic, schema-driven) ---------- */
function renderFormModal(m){
  const schema = SCHEMAS[m.entity];
  const draft = m.draft;
  const hasTabs = !!schema.tabs;
  const activeTab = m.activeTab||0;
  const fieldsForTab = f => !hasTabs || f.tab===activeTab;

  const tabsHtml = hasTabs ? `<div class="tabs">${schema.tabs.map((t,i)=>`<button type="button" class="tab-btn ${i===activeTab?'active':''}" onclick="App.setModalTab(${i})">${t}</button>`).join('')}</div>` : '';

  const fieldsHtml = schema.fields.filter(fieldsForTab).map(f=>renderField(f,draft)).join('');

  return `
  <div class="overlay" onclick="if(event.target===this) App.closeModal()">
    <div class="modal ${hasTabs?'modal-lg':''}">
      <div class="modal-head">
        <div><h3>${m.isNew?'New':'Edit'} ${schema.singular}</h3><p>${m.isNew?`Create a new ${schema.singular.toLowerCase()} record.`:`Editing an existing record`}</p></div>
        <button class="modal-close" onclick="App.closeModal()">${icon('x',16)}</button>
      </div>
      <div class="modal-body">
        ${tabsHtml}
        <div class="form-grid">${fieldsHtml}</div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="App.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="App.saveForm()">${icon('check',15)}Save ${schema.singular}</button>
      </div>
    </div>
  </div>`;
}

function renderField(f,draft){
  const val = draft[f.key];
  const spanCls = f.col==='span2' ? 'span2' : '';
  const label = `<label>${esc(f.label)}${f.required?'<span class="req">*</span>':''}</label>`;
  const hint = f.hint?`<span class="field-hint">${esc(f.hint)}</span>`:'';
  let control = '';
  switch(f.type){
    case 'text': case 'email': case 'url':
      control = `<input type="${f.type}" value="${esc(val||'')}" oninput="App.setDraft('${f.key}',this.value)" placeholder="${esc(f.label)}">`; break;
    case 'number':
      control = `<input type="number" value="${esc(val??'')}" oninput="App.setDraft('${f.key}',this.value)">`; break;
    case 'textarea':
      control = `<textarea oninput="App.setDraft('${f.key}',this.value)">${esc(val||'')}</textarea>`; break;
    case 'select':
      control = `<select onchange="App.setDraft('${f.key}',this.value)"><option value="">Select…</option>${f.options.map(o=>`<option value="${esc(o)}" ${val===o?'selected':''}>${esc(o)}</option>`).join('')}</select>`; break;
    case 'fk': {
      const opts = f.optionsFn();
      control = `<select onchange="App.setDraft('${f.key}',Number(this.value))"><option value="">Select…</option>${opts.map(o=>`<option value="${o.value}" ${val===o.value?'selected':''}>${esc(o.label)}</option>`).join('')}</select>`;
      break;
    }
    case 'boolean':
      control = `<div class="toggle ${val?'on':''}" onclick="App.toggleDraft('${f.key}')"><div class="toggle-knob"></div></div>`; break;
    case 'rating':
      control = `<div class="rating-input">${[1,2,3,4,5].map(n=>`<span class="rating-star ${val>=n?'on':''}" onclick="App.setDraft('${f.key}',${n})">★</span>`).join('')}</div>`; break;
    case 'image':
      control = `<div class="img-field">
        ${val?`<img class="img-preview" src="${val}">`:`<div class="img-preview-empty">${icon('image',22)}</div>`}
        <div style="display:flex;flex-direction:column;gap:6px">
          <button type="button" class="btn btn-ghost btn-sm" onclick="App.pickMedia('${f.key}')">${icon('image',13)}Choose from Library</button>
          ${val?`<button type="button" class="btn btn-danger-ghost btn-sm" onclick="App.setDraft('${f.key}','')">${icon('x',13)}Remove</button>`:''}
        </div>
      </div>`; break;
    case 'gallery': {
      const arr = val||[];
      control = `<div class="gallery-grid">
        ${arr.map((g,i)=>`<div class="gallery-item"><img src="${g}"><div class="rm" onclick="App.removeGalleryItem('${f.key}',${i})">${icon('x',11)}</div></div>`).join('')}
        <div class="gallery-add" onclick="App.pickMedia('${f.key}',true)">${icon('plus',18)}<span>Add</span></div>
      </div>`; break;
    }
    case 'm2m': {
      const opts = f.optionsFn();
      const sel = val||[];
      control = `<div class="m2m-list">${opts.map(o=>`<div class="m2m-opt ${sel.includes(o.value)?'checked':''}" onclick="App.toggleM2M('${f.key}',${o.value})">${sel.includes(o.value)?icon('check',12):''}${esc(o.label)}</div>`).join('')}</div>`; break;
    }
    case 'richtext':
      control = renderRichText(f.key, val||'');
      break;
    case 'pricehistory': {
      const hist = val||[];
      const status = draft.property_status;
      if(!hist.length){ control = `<div class="field-hint">No price changes recorded yet — changing the price above and saving will log an entry here.</div>`; }
      else {
        control = `<div class="price-history-list">${hist.map((h,i)=>`
          <div class="price-history-row">
            <span class="cell-sub">${fmtDate(h.date)}</span>
            <span class="font-mono" style="font-weight:600">${fmtPriceFor(h.price,status)}</span>
            ${i<hist.length-1 ? `<span style="color:var(--text-faint)">${icon('chevronRight',12)}</span>` : `<span class="chip chip-brass">Current at the time</span>`}
          </div>`).join('')}
        </div>`;
      }
      break;
    }
    default:

/* ================= DASHBOARD MAP ================= */
/* Approximate coordinates for Addis Ababa neighborhoods referenced in listings. */
const NEIGHBORHOOD_COORDS = {
  'Bole Atlas':[8.9990,38.7850], 'Bole':[8.9959,38.7891], 'Ayat':[9.0154,38.8636],
  'CMC':[9.0269,38.8072], 'Kazanchis':[9.0180,38.7630], 'Bole Arabsa':[8.9750,38.8450],
  'Old Airport':[8.9840,38.7570], 'Summit':[9.0100,38.8300], 'Kirkos':[9.0100,38.7550],
};
const ADDIS_CENTER = [9.0054, 38.7891];
function seededJitter(id){ const x = Math.sin(id*999)*10000; return (x-Math.floor(x)-0.5); }
function propertyLatLng(p){
  const key = Object.keys(NEIGHBORHOOD_COORDS).find(k=>(p.property_location||'').includes(k));
  const base = key ? NEIGHBORHOOD_COORDS[key] : ADDIS_CENTER;
  const jx = seededJitter(p.id)*0.012, jy = seededJitter(p.id+500)*0.012;
  return [base[0]+jx, base[1]+jy];
}
let _dashboardMapInstance = null;
function initDashboardMap(){
  const el = document.getElementById('dashboardMap');
  if(!el || typeof L==='undefined') return;
  if(_dashboardMapInstance){ _dashboardMapInstance.remove(); _dashboardMapInstance=null; }
  const map = L.map(el, {scrollWheelZoom:false}).setView(ADDIS_CENTER, 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'&copy; OpenStreetMap contributors', maxZoom:19,
  }).addTo(map);
  const bounds = [];
  STATE.properties.forEach(p=>{
    const [lat,lng] = propertyLatLng(p);
    bounds.push([lat,lng]);
    const isRent = p.property_status==='For Rent';
    const iconHtml = `<div class="pin"><div class="pin-body ${isRent?'rent':''}"><div class="pin-dot"></div></div></div>`;
    const divIcon = L.divIcon({html:iconHtml, className:'', iconSize:[30,30], iconAnchor:[15,28], popupAnchor:[0,-26]});
    const cat = STATE.category.find(c=>c.id===p.property_types);
    const agent = STATE.egent.find(a=>a.id===p.agent);
    const statusChip = isRent ? `<span class="chip chip-success">For Rent</span>` : `<span class="chip chip-brass">For Sale</span>`;
    const popupHtml = `<div class="map-balloon">
      <img src="${p.main_image}">
      <div class="map-balloon-body">
        <div class="map-balloon-title">${esc(p.property_title)}</div>

        <div class="map-balloon-price">${fmtPropertyPrice(p)}</div>
        <div class="map-balloon-meta">
          <span>${statusChip}</span>
          <span>${cat?esc(cat.catagorys):'—'}</span>
          <span>${esc(p.bedrooms)} bd · ${esc(p.bathrooms)} ba</span>
        </div>
        <div class="map-balloon-agent">Agent: ${agent?esc(agent.name):'Unassigned'}</div>
        <a class="map-balloon-btn" href="#" onclick="App.go('properties');setTimeout(()=>App.openForm('properties',${p.id}),0);return false">View / Edit Listing</a>
      </div>

    L.marker([lat,lng], {icon:divIcon}).addTo(map).bindPopup(popupHtml);

  if(bounds.length) map.fitBounds(bounds, {padding:[30,30], maxZoom:14});

  setTimeout(()=>map.invalidateSize(), 150);
}

/* ================= AGENT LEADERBOARD ================= */
function computeAgentStats(){
  return STATE.egent.map(a=>{
    const listings = STATE.properties.filter(p=>p.agent===a.id);
    const closed = listings.filter(p=>p.availability==='Sold'||p.availability==='Rented Out');
    const num = v => Number(String(v).replace(/[^0-9.]/g,''))||0;
    const salesCommission = closed.filter(p=>p.availability==='Sold').reduce((sum,p)=>sum+num(p.price)*(Number(p.commission_rate)||0)/100,0);
    const rentCommission = closed.filter(p=>p.availability==='Rented Out').reduce((sum,p)=>sum+num(p.price)*(Number(p.commission_rate)||0)/100,0);
    const conversion = listings.length ? Math.round(closed.length/listings.length*100) : 0;
    return {agent:a, listings:listings.length, closed:closed.length, salesCommission, rentCommission, conversion};
  }).sort((a,b)=> b.closed-a.closed || b.salesCommission-a.salesCommission);
}

/* ================= ACTIVITY LOG ================= */
const ACTIVITY_ICONS = {Created:'plus', Updated:'edit', Deleted:'trash', Imported:'upload'};
function activityBadgeCls(action){ return action==='Created'?'chip-success':action==='Deleted'?'chip-danger':action==='Imported'?'chip-brass':'chip-gray'; }
function renderActivityLogPage(){
  const st = tState('activity');
  const modules = ['All modules', ...new Set(STATE.activityLog.map(a=>a.module))];
  const filterMod = st.moduleFilter || 'All modules';
  let rows = STATE.activityLog.filter(a=>{
    const matchesMod = filterMod==='All modules' || a.module===filterMod;
    const matchesSearch = !st.search || (a.label+' '+a.user+' '+a.action).toLowerCase().includes(st.search.toLowerCase());
    return matchesMod && matchesSearch;
  });
  const total = rows.length;

/* Lightweight RFC4180-style CSV parser/serializer — no external dependency. */
function csvParse(text){
  text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const rows = []; let row = []; let field = ''; let inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQuotes=false; }
      else field += c;
    } else {
      if(c==='"') inQuotes = true;
      else if(c===','){ row.push(field); field=''; }
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  const nonEmpty = rows.filter(r=>!(r.length===1 && r[0]===''));
  if(!nonEmpty.length) return [];
  const header = nonEmpty[0].map(h=>h.trim());
  return nonEmpty.slice(1).map(r=>{
    const obj = {};
    header.forEach((h,i)=>obj[h]=r[i]!==undefined?r[i]:'');
    return obj;
  });
}
function csvField(v){
  v = v===undefined||v===null ? '' : String(v);
  if(/[",\n]/.test(v)) return '"'+v.replace(/"/g,'""')+'"';
  return v;
}
function csvUnparse(fields, rows){
  const lines = [fields.map(csvField).join(',')];
  rows.forEach(r=>lines.push(r.map(csvField).join(',')));
  return lines.join('\n');
}

const CSV_COLUMNS = ['property_title','property_status','availability','category','agent','price','property_location','property_size','property_area','property_floor','bedrooms','bathrooms','furnished','facilities','short_description','main_image','gallery','video_link','slug'];

function propertyToCSVRow(p){
  const cat = STATE.category.find(c=>c.id===p.property_types);
  const agent = STATE.egent.find(a=>a.id===p.agent);
  const facs = (p.facilitie||[]).map(fid=>{ const f=STATE.facilities.find(x=>x.id===fid); return f?f.facilities_name:null; }).filter(Boolean);
  return {
    property_title:p.property_title, property_status:p.property_status, availability:p.availability, category:cat?cat.catagorys:'',
    agent:agent?agent.name:'', price:p.price, property_location:p.property_location,
    property_size:p.property_size, property_area:p.property_area, property_floor:p.property_floor,
    bedrooms:p.bedrooms, bathrooms:p.bathrooms, furnished:p.furnished,
    facilities:facs.join('; '), short_description:p.propertyshortdiscription,
    main_image:p.main_image, gallery:(p.gallery||[]).join(' | '), video_link:p.video_link, slug:p.slug,
  };
}
function csvRowToProperty(row, idx, nextId, nextNum){
  const errors = [];
  const title = (row.property_title||'').trim();
  if(!title) errors.push('Missing property_title');
  const priceRaw = (row.price||'').toString().replace(/[^0-9.]/g,'');
  if(!priceRaw) errors.push('Missing or invalid price');
  const statusRaw = (row.property_status||'').trim().toLowerCase();
  const status = statusRaw.includes('rent') ? 'For Rent' : statusRaw.includes('sale') ? 'For Sale' : 'For Sale';
  const availRaw = (row.availability||'').trim().toLowerCase();
  const availability = availRaw.includes('sold') ? 'Sold' : availRaw.includes('rented') ? 'Rented Out' : 'Available';

  let catName = (row.category||'').trim();
  let cat = STATE.category.find(c=>c.catagorys.toLowerCase()===catName.toLowerCase());
  let createdCategory = false;
  if(!cat && catName){
    cat = {id:Math.max(0,...STATE.category.map(c=>c.id))+1, catagorys:catName, slug:catName.toLowerCase().replace(/[^a-z0-9]+/g,'-'), icon:placeholderImg('cat-'+catName,200,200)};
    STATE.category.push(cat); createdCategory = true;
  }
  let agentName = (row.agent||'').trim();
  let agent = STATE.egent.find(a=>a.name.toLowerCase()===agentName.toLowerCase());

  const facNames = (row.facilities||'').split(/[;|]/).map(s=>s.trim()).filter(Boolean);
  const facIds = [];
  let createdFacilities = 0;
  facNames.forEach(fn=>{
    let f = STATE.facilities.find(x=>x.facilities_name.toLowerCase()===fn.toLowerCase());
    if(!f){ f = {id:Math.max(0,...STATE.facilities.map(x=>x.id))+1, facilities_name:fn, slug:fn.toLowerCase().replace(/[^a-z0-9]+/g,'-')}; STATE.facilities.push(f); createdFacilities++; }
    facIds.push(f.id);
  });

  const gallery = (row.gallery||'').split('|').map(s=>s.trim()).filter(Boolean);
  const slug = (row.slug||title).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || ('property-'+nextNum);

  const property = {
    id:nextId, property_id:'PR-'+nextNum,
    property_title:title, slug,
    price:priceRaw||'0', property_types: cat?cat.id:'', agent: agent?agent.id:'',
    facilitie: facIds, property_location:(row.property_location||'').trim(),
    property_size:Number(row.property_size)||0, property_area:Number(row.property_area)||0,
    property_status:status, availability, property_floor:Number(row.property_floor)||1,
    bedrooms:(row.bedrooms||'').toString(), bathrooms:(row.bathrooms||'').toString(), furnished:(row.furnished||'Unfurnished').trim(),
    propertyshortdiscription:(row.short_description||'').trim(),
    main_image:(row.main_image||'').trim() || placeholderImg('import-'+nextNum,700,470),
    gallery, video_link:(row.video_link||'').trim(),
    last_update:new Date().toISOString(),
  };
  return {property, errors, createdCategory, createdFacilities, rowNum:idx+2};
}
function downloadTextFile(filename, text, mime){
  const blob = new Blob([text], {type:mime||'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 200);
}

      if(e.key==='ArrowDown'){ e.preventDefault(); UI.cmdPalette.index = Math.min(UI.cmdPalette.index+1, UI.cmdPalette.flatItems.length-1); highlightCmdIndex(); }
      else if(e.key==='ArrowUp'){ e.preventDefault(); UI.cmdPalette.index = Math.max(UI.cmdPalette.index-1, 0); highlightCmdIndex(); }
      else if(e.key==='Enter'){ e.preventDefault(); const item=UI.cmdPalette.flatItems[UI.cmdPalette.index]; if(item) item.action(); }

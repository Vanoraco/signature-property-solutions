      if(entity==='users') notify('user','User invited','"'+label+'" was added to the team.','users');
    } else {
      const idx = STATE[entity].findIndex(r=>r.id===id);
      const prevRecord = STATE[entity][idx];
      let priceChanged = false;
      if(entity==='properties' && String(prevRecord.price)!==String(draft.price)){
        priceChanged = true;
        draft.price_history = (prevRecord.price_history||[]).concat([{price:prevRecord.price, date:new Date().toISOString()}]);
        logActivity('Updated', 'Properties', label+' — price changed from '+fmtPriceFor(prevRecord.price,draft.property_status)+' to '+fmtPriceFor(draft.price,draft.property_status));
      }
      STATE[entity][idx] = {...prevRecord, ...draft, id};
      toast(schema.singular+' updated','success');
      if(!priceChanged) logActivity('Updated', schema.label, label);
    }
    UI.modal=null; render();
  },
  closeModal(){ UI.modal=null; render(); },

  /* ---- view / delete ---- */
  openView(entity,id){ const record = STATE[entity].find(r=>r.id===id); UI.modal={kind:'view',entity,record}; render(); },
  confirmDelete(entity,id){
    const schema = SCHEMAS[entity];
    const rec = STATE[entity].find(r=>r.id===id);
    const label = recordLabel(rec, id);
    UI.modal = {kind:'confirm', title:'Delete '+schema.singular+'?', message:`"${label}" will be permanently removed. This cannot be undone.`, onConfirm:()=>{
      STATE[entity] = STATE[entity].filter(r=>r.id!==id);
      toast(schema.singular+' deleted','danger','trash');
      logActivity('Deleted', schema.label, label);
    }};
    render();
  },
  runConfirm(){ if(UI.modal && UI.modal.onConfirm) UI.modal.onConfirm(); UI.modal=null; render(); },

  /* ---- singleton settings pages ---- */
  setSingleton(entity,key,val){ STATE[entity][key]=val; },
  setSettingsTab(entity,i){ UI.settingsTab[entity]=i; render(); },
  rteSettingsCmd(entity,key,cmd){
    const el = document.getElementById('settings-rte-'+entity+'-'+key);
    el.focus(); document.execCommand(cmd,false,null);
    STATE[entity][key] = el.innerHTML;
  },
  saveSingleton(entity){
    const pageName = (entity[0].toUpperCase()+entity.slice(1))+' page';
    toast(pageName+' saved','success');
    logActivity('Updated', pageName, 'Content changes saved');
  },

  /* ---- media library ---- */
  handleFiles(fileList){
    const files = Array.from(fileList||[]);
    if(!files.length) return;
    files.forEach(file=>{
      const url = URL.createObjectURL(file);
      STATE.media.push({id:uid(), url, name:file.name, kind:'image', size:Math.round(file.size/1024)+' KB', uploadedAt:new Date().toISOString()});
    });
    toast(files.length+' file'+(files.length>1?'s':'')+' uploaded','success','upload');
    if(UI.modal && UI.modal.kind==='mediaPicker') render(); else render();
  },
  handleDrop(ev,zoneEl){
    ev.preventDefault(); zoneEl.classList.remove('drag');
    this.handleFiles(ev.dataTransfer.files);
  },
  inspectMedia(id){
    const f = STATE.media.find(m=>m.id===id);
    toast('Viewing '+f.name,'default','image');
  },
  filterMediaPicker(q){
    q=q.toLowerCase();
    document.querySelectorAll('#pickerGrid .media-card').forEach(card=>{
      const name = card.querySelector('.media-name').textContent.toLowerCase();
      card.style.display = name.includes(q) ? '' : 'none';
    });
  },

  /* image / gallery field -> media picker bridge */
  pickMedia(fieldKey, isGallery){
    UI.returnModal = UI.modal; // remember the modal (form/settings) to restore after picking
    UI.mediaPickerTarget = {fieldKey, isGallery, singleton: fieldKey.includes('.')};
    UI.modal = {kind:'mediaPicker'};
    render();
  },
  selectMedia(url){
    const t = UI.mediaPickerTarget;
    if(t){
      if(t.singleton){
        const [entity,key] = t.fieldKey.split('.');
        STATE[entity][key] = url;
      } else if(UI.returnModal && UI.returnModal.draft){
        const draft = UI.returnModal.draft;
        if(t.isGallery) draft[t.fieldKey] = (draft[t.fieldKey]||[]).concat(url);
        else draft[t.fieldKey] = url;
      }
    }
    UI.modal = UI.returnModal || null;
    UI.returnModal = null;
    UI.mediaPickerTarget = null;
    render();
  },

  /* ---- form builder ---- */
  addFormField(){ UI.modal = {kind:'fbField', draft:{id:'f'+uid(), label:'New Field', type:'text', required:false}, isNewField:true}; UI.returnModal=null; render(); },
  editFormField(id){ const f = STATE.formFields.find(x=>x.id===id); UI.modal = {kind:'fbField', draft:JSON.parse(JSON.stringify(f))}; render(); },
  setFbDraft(key,val){ UI.modal.draft[key]=val; render(); },
  saveFbField(){
    const d = UI.modal.draft;
    if(!d.label){ toast('Field label is required','danger','x'); return; }
    const idx = STATE.formFields.findIndex(f=>f.id===d.id);
    if(idx>-1) STATE.formFields[idx]=d; else STATE.formFields.push(d);
    toast('Field saved','success');
    UI.modal=null; render();
  },
  toggleFormFieldRequired(id){ const f=STATE.formFields.find(x=>x.id===id); f.required=!f.required; render(); },
  removeFormField(id){ STATE.formFields = STATE.formFields.filter(f=>f.id!==id); toast('Field removed','danger','trash'); render(); },
  fbDragStart(ev,i){ UI.fbDrag=i; ev.currentTarget.classList.add('dragging'); },
  fbDragEnd(ev){ ev.currentTarget.classList.remove('dragging'); },
  fbDrop(ev,i){
    ev.preventDefault();
    const from = UI.fbDrag;
    if(from===null||from===undefined||from===i) return;
    const arr = STATE.formFields;
    const [moved] = arr.splice(from,1);
    arr.splice(i,0,moved);
    UI.fbDrag=null;
    render();
  },

  /* ---- bulk import / export (properties) ---- */
  exportCSV(key){
    const st = tState(key);
    const schema = SCHEMAS[key];
    let rows = STATE[key].filter(r=>matchesSearch(r,schema,st.search));
    if(!rows.length){ toast('Nothing to export','danger','x'); return; }
    const csvRows = rows.map(propertyToCSVRow);
    const csv = csvUnparse(CSV_COLUMNS, csvRows.map(r=>CSV_COLUMNS.map(c=>r[c])));
    downloadTextFile('signature-properties-'+new Date().toISOString().slice(0,10)+'.csv', csv);
    toast(rows.length+' propert'+(rows.length===1?'y':'ies')+' exported','success','download');
  },

  /* ---- bulk row selection & actions ---- */
  toggleRowSelect(key,id,checked){
    if(!UI.selection[key]) UI.selection[key]={};
    UI.selection[key][id] = checked;
    render();
  },
  toggleSelectAllVisible(key,checked,ids){
    if(!UI.selection[key]) UI.selection[key]={};
    ids.forEach(id=>UI.selection[key][id]=checked);
    render();
  },
  clearSelection(key){ UI.selection[key]={}; render(); },
  bulkDelete(key){
    const schema = SCHEMAS[key];
    const ids = Object.keys(UI.selection[key]||{}).filter(id=>UI.selection[key][id]).map(Number);
    if(!ids.length) return;
    UI.modal = {kind:'confirm', title:`Delete ${ids.length} ${schema.label}?`, message:`${ids.length} record${ids.length===1?'':'s'} will be permanently removed. This cannot be undone.`, onConfirm:()=>{
      STATE[key] = STATE[key].filter(r=>!ids.includes(r.id));
      UI.selection[key] = {};
      toast(ids.length+' record'+(ids.length===1?'':'s')+' deleted','danger','trash');
      logActivity('Deleted', schema.label, ids.length+' records bulk-deleted');
    }};
    render();
  },
  bulkExport(key){
    const ids = Object.keys(UI.selection[key]||{}).filter(id=>UI.selection[key][id]).map(Number);
    if(!ids.length) return;
    const rows = STATE[key].filter(r=>ids.includes(r.id));
    const csvRows = rows.map(propertyToCSVRow);
    const csv = csvUnparse(CSV_COLUMNS, csvRows.map(r=>CSV_COLUMNS.map(c=>r[c])));
    downloadTextFile('signature-properties-selected-'+new Date().toISOString().slice(0,10)+'.csv', csv);
    toast(rows.length+' propert'+(rows.length===1?'y':'ies')+' exported','success','download');
  },
  bulkSetAvailability(key,value){
    const ids = Object.keys(UI.selection[key]||{}).filter(id=>UI.selection[key][id]).map(Number);
    if(!ids.length) return;
    STATE[key].forEach(r=>{ if(ids.includes(r.id)) r.availability = value; });
    toast(ids.length+' propert'+(ids.length===1?'y':'ies')+' set to '+value,'success');
    logActivity('Updated', SCHEMAS[key].label, ids.length+' properties set to '+value);
    UI.selection[key] = {};
    render();
  },

  /* ---- print / PDF property flyer (uses the browser's native print dialog) ---- */
  printFlyer(id){
    const p = STATE.properties.find(x=>x.id===id);
    if(!p) return;
    const cat = STATE.category.find(c=>c.id===p.property_types);
    const agent = STATE.egent.find(a=>a.id===p.agent);
    const facs = (p.facilitie||[]).map(fid=>{ const f=STATE.facilities.find(x=>x.id===fid); return f?f.facilities_name:null; }).filter(Boolean);
    const statusLabel = p.property_status==='For Sale' ? 'For Sale' : 'For Rent';
    const win = window.open('', '_blank');
    if(!win){ toast('Please allow pop-ups to print the flyer','danger','x'); return; }
    win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(p.property_title)} — Flyer</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{font-family:'Inter',sans-serif;color:#1C1C1C;padding:36px;max-width:800px;margin:0 auto}
      .flyer-brand{display:flex;align-items:center;gap:10px;margin-bottom:22px}
      .flyer-mark{width:36px;height:36px;border:1.5px solid #C9A227;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;font-style:italic;color:#C9A227;font-size:20px}
      .flyer-brand b{font-family:'Fraunces',serif;font-size:18px}
      .flyer-brand span{font-size:10px;letter-spacing:2px;color:#9AA1AA;text-transform:uppercase;display:block}
      .flyer-hero{width:100%;height:320px;object-fit:cover;border-radius:10px;margin-bottom:18px}
      .flyer-title{font-family:'Fraunces',serif;font-size:26px;font-weight:700;margin-bottom:4px}
      .flyer-loc{color:#5C5C5C;font-size:14px;margin-bottom:14px}
      .flyer-price{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:#C9A227;margin-bottom:16px}
      .flyer-badges{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
      .flyer-badge{background:#F6EDCE;color:#9C7A17;font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:20px}
      .flyer-meta{display:flex;gap:26px;margin-bottom:18px;flex-wrap:wrap}
      .flyer-meta div b{display:block;font-size:17px}
      .flyer-meta div span{font-size:11px;color:#8C8C8C;text-transform:uppercase;letter-spacing:.5px}
      .flyer-desc{font-size:13.5px;line-height:1.7;color:#333;margin-bottom:18px}
      .flyer-facilities{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:22px}
      .flyer-fac{background:#F5F4F1;font-size:11.5px;padding:5px 11px;border-radius:20px;color:#5C5C5C}
      .flyer-gallery{display:flex;gap:8px;margin-bottom:22px}
      .flyer-gallery img{width:100%;height:100px;object-fit:cover;border-radius:8px}
      .flyer-agent{display:flex;align-items:center;gap:14px;border-top:2px solid #1B1B1B;padding-top:18px}
      .flyer-agent img{width:56px;height:56px;border-radius:50%;object-fit:cover}
      .flyer-agent b{font-size:14.5px}
      .flyer-agent div.contact{font-size:12px;color:#5C5C5C;margin-top:2px}
      @media print{ body{padding:0} }
    </style></head><body>
      <div class="flyer-brand"><div class="flyer-mark">S</div><div><b>Signature</b><span>Property Solutions</span></div></div>
      <img class="flyer-hero" src="${p.main_image}">
      <div class="flyer-title">${esc(p.property_title)}</div>
      <div class="flyer-loc">${icon('mapPin',13)} ${esc(p.property_location)}</div>
      <div class="flyer-price">${fmtPropertyPrice(p)}</div>
      <div class="flyer-badges">
        <span class="flyer-badge">${esc(statusLabel)}</span>
        <span class="flyer-badge">${cat?esc(cat.catagorys):''}</span>
        <span class="flyer-badge">${esc(p.availability)}</span>
      </div>
      <div class="flyer-meta">
        <div><b>${esc(p.bedrooms)}</b><span>Bedrooms</span></div>
        <div><b>${esc(p.bathrooms)}</b><span>Bathrooms</span></div>
        <div><b>${esc(p.property_size)} m²</b><span>Size</span></div>
        <div><b>${esc(p.furnished)}</b><span>Furnished</span></div>
      </div>
      <div class="flyer-desc">${esc(p.propertyshortdiscription)}</div>
      ${facs.length? `<div class="flyer-facilities">${facs.map(f=>`<span class="flyer-fac">${esc(f)}</span>`).join('')}</div>` : ''}
      ${(p.gallery&&p.gallery.length)? `<div class="flyer-gallery">${p.gallery.slice(0,3).map(g=>`<img src="${g}">`).join('')}</div>` : ''}
      <div class="flyer-agent">
        <img src="${agent?agent.image:placeholderImg('agent-fallback',100,100)}">
        <div>
          <b>${agent?esc(agent.name):'Signature Property Solutions'}</b>
          <div class="contact">${agent?esc(agent.phone_number):'+251960226666'} · ${agent?esc(agent.email):'info@signaturepropertysolutions.com'}</div>
        </div>
      </div>
    </body></html>`);
    win.document.close();
    win.onload = () => setTimeout(()=>win.print(), 400);
  },
  downloadTemplate(){
    const example = {
      property_title:'Atlas Apartment', property_status:'For Rent', availability:'Available', category:'Apartment', agent:'Mihreteab Dawit',
      price:'2500', property_location:'Bole Atlas, Addis Ababa', property_size:'140', property_area:'160', property_floor:'4',
      bedrooms:'3', bathrooms:'3', furnished:'Furnished', facilities:'24/7 Security; Elevator; Underground Parking',
      short_description:'A well-maintained apartment in Bole Atlas, close to schools and transit.',
      main_image:'https://example.com/image.jpg', gallery:'https://example.com/1.jpg | https://example.com/2.jpg',
      video_link:'', slug:'atlas-apartment',
    };
    const csv = csvUnparse(CSV_COLUMNS, [CSV_COLUMNS.map(c=>example[c])]);
    downloadTextFile('property-import-template.csv', csv);
  },
  openImport(key){ UI.modal = {kind:'import', entity:key, parsed:null}; render(); },
  resetImport(){ UI.modal.parsed = null; render(); },
  handleImportDrop(ev, zoneEl){ ev.preventDefault(); zoneEl.classList.remove('drag'); this.handleImportFile(ev.dataTransfer.files); },
  handleImportFile(fileList){
    const file = fileList && fileList[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      let data;
      try { data = csvParse(reader.result); }
      catch(e){ toast('Could not parse that file','danger','x'); return; }
      const valid=[], invalid=[];
      let newCategories=0, newFacilities=0;
      let nextId = Math.max(0,...STATE.properties.map(r=>r.id));
      let nextNum = Math.max(1100,...STATE.properties.map(r=>Number((r.property_id||'PR-1100').replace('PR-',''))||1100));
      data.forEach((row,idx)=>{
        nextId++; nextNum++;
        const res = csvRowToProperty(row, idx, nextId, nextNum);
        if(res.createdCategory) newCategories++;
        newFacilities += res.createdFacilities;
        if(res.errors.length) invalid.push(res); else valid.push(res);
      });
      UI.modal.parsed = {valid, invalid, newCategories, newFacilities};
      render();
    };
    reader.onerror = () => toast('Could not read that file','danger','x');
    reader.readAsText(file);
  },
  confirmImport(){
    const parsed = UI.modal.parsed;
    if(!parsed || !parsed.valid.length) return;
    parsed.valid.forEach(r=>STATE.properties.push(r.property));
    toast(parsed.valid.length+' propert'+(parsed.valid.length===1?'y':'ies')+' imported', 'success','check');
    logActivity('Imported', 'Properties', parsed.valid.length+' properties imported via CSV');
    notify('system','Import completed', parsed.valid.length+' properties were imported via CSV.','properties');
    UI.modal=null; render();
  },

  /* ---- roles & permissions ---- */
  openRoleForm(id){
    const isNew = id===undefined;
    const draft = isNew
      ? {name:'', description:'', color:'#C9A227', permissions:fullPerms('none')}
      : JSON.parse(JSON.stringify(roleById(id)));
    UI.modal = {kind:'roleForm', isNew, id, draft};
    render();
  },
  setRoleDraft(key,val){ UI.modal.draft[key]=val; render(); },
  saveRole(){
    const {isNew,id,draft} = UI.modal;
    if(!draft.name || !draft.name.trim()){ toast('Role name is required','danger','x'); return; }
    if(isNew){
      const newId = Math.max(0,...STATE.roles.map(r=>r.id))+1;
      STATE.roles.push({id:newId, name:draft.name, description:draft.description, color:draft.color, permissions:draft.permissions});
      toast('Role created','success');
      logActivity('Created', 'Roles & Permissions', draft.name);
    } else {
      const idx = STATE.roles.findIndex(r=>r.id===id);
      STATE.roles[idx] = {...STATE.roles[idx], name:draft.name, description:draft.description, color:draft.color};
      toast('Role updated','success');
      logActivity('Updated', 'Roles & Permissions', draft.name);
    }
    UI.modal=null; render();
  },
  confirmDeleteRole(id){
    const role = roleById(id);
    const members = userCountForRole(id);
    if(members>0){ toast(`Reassign ${members} user${members===1?'':'s'} before deleting "${role.name}"`,'danger','x'); return; }
    UI.modal = {kind:'confirm', title:'Delete Role?', message:`"${role.name}" will be permanently removed.`, onConfirm:()=>{
      STATE.roles = STATE.roles.filter(r=>r.id!==id);
      toast('Role deleted','danger','trash');
      logActivity('Deleted', 'Roles & Permissions', role.name);
    }};
    render();
  },
  setPermission(roleId, moduleKey, level){
    const role = roleById(roleId);
    role.permissions[moduleKey] = level;
    const moduleLabel = MODULES.find(m=>m.key===moduleKey).label;
    toast(role.name+' — '+moduleLabel+' set to '+level,'success');
    logActivity('Updated', 'Roles & Permissions', role.name+' — '+moduleLabel+' set to '+level);
    notify('role','Role updated', role.name+' permissions were changed.', 'roles');
    render();
  },
  setPreviewRole(id){ UI.previewRole = id ? Number(id) : null; render(); },
};

/* ================= INIT ================= */
document.documentElement.setAttribute('data-theme', UI.darkMode?'dark':'light');
document.addEventListener('keydown', (e)=>{
  const k = e.key.toLowerCase();
  if((e.metaKey||e.ctrlKey) && k==='k'){
    e.preventDefault();
    if(UI.cmdPalette) App.closeCommandPalette(); else App.openCommandPalette();
  }
});
render();
</script>
</body>
